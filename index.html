<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Gallery</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

header{
  text-align:center;
  padding:30px 15px;
}

header h1{
  color:#ff4d88;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:15px;
}

.card{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card .desc{
  padding:8px;
  font-size:13px;
  color:#bbb;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-box{
  background:#111;
  padding:15px;
  border-radius:12px;
  text-align:center;
  max-width:320px;
  width:90%;
}

.popup-box img{
  width:100%;
  border-radius:10px;
}

.btn{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  cursor:pointer;
  border-radius:8px;
  width:100%;
}

.btn.ok{
  background:#ff4d88;
  color:#fff;
}

.btn.no{
  background:#333;
  color:#fff;
}
</style>
</head>

<body>
