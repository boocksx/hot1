<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Collection</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b0b;
  color:#fff;
}

header{
  padding:80px 20px;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1494905998402-395d579af36f') center/cover;
  background-size:cover;
}

header h1{
  background:rgba(0,0,0,0.6);
  display:inline-block;
  padding:12px 25px;
  border-radius:12px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
}

.card{
  background:#161616;
  border-radius:14px;
  overflow:hidden;
  padding-bottom:10px;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.content{
  padding:12px;
}

h3{
  margin:8px 0;
  color:#ffcc70;
}

.specs{
  font-size:14px;
  line-height:1.5;
  color:#ccc;
}

.desc{
  font-size:13px;
  color:#aaa;
  margin-bottom:8px;
}

/* 🔥 STICKY BANNER */
.sticky-ad{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#ff9800;
  text-align:center;
  padding:12px;
  font-weight:bold;
  z-index:9999;
}

.sticky-ad a{
  color:#000;
  text-decoration:none;
}

/* 🔔 POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.popup-box{
  background:#fff;
  color:#000;
  padding:20px;
  width:280px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<header>
<h1>Popular Car Collection</h1>
</header>

<div class="container">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">
<div class="content">
<h3>BMW M5 Competition</h3>
<div class="desc">Luxury sport sedan</div>
<div class="specs">4.4L V8 • 625 HP • 3.3s</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a">
<div class="content">
<h3>Mercedes C63 AMG</h3>
<div class="desc">Aggressive performance sedan</div>
<div class="specs">4.0L V8 • 503 HP • 3.9s</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
<div class="content">
<h3>Porsche 911 Turbo S</h3>
<div class="desc">Supercar legend</div>
<div class="specs">3.8L Turbo • 580 HP • 2.9s</div>
</div>
</div>

</div>
</div>

<!-- 🔥 STICKY AD -->
<div class="sticky-ad">
  <a href="https://grzvkg.datewiithyou.net/?utm_source=da57dc555e50572d&ban=fb&j1=1&s1=212364&s2=2263693" target="_blank">
    🔥 Click here for special offer
  </a>
</div>

<!-- 🔔 POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <h2>Special Offer</h2>
    <p>Continue to unlock content</p>

    <a href="https://grzvkg.datewiithyou.net/?utm_source=da57dc555e50572d&ban=fb&j1=1&s1=212364&s2=2263693" target="_blank">
      <button>Continue</button>
    </a>

    <button onclick="closePopup()" style="margin-top:10px;background:#ccc;">
      Close
    </button>
  </div>
</div>

<script>

const offerUrl = "https://grzvkg.datewiithyou.net/?utm_source=da57dc555e50572d&ban=fb&j1=1&s1=212364&s2=2263693";

function isMobile(){
  return window.innerWidth <= 768;
}

// 🧠 show once
function showPopup(){
  if(!isMobile()) return;
  if(localStorage.getItem("popup_seen") === "1") return;

  document.getElementById("popup").style.display = "flex";
  localStorage.setItem("popup_seen", "1");
}

// ❌ close
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

// ⏱ auto show
setTimeout(showPopup, 5000);

// 📱 extra trigger (scroll up)
window.addEventListener("scroll", function(){
  if(isMobile() && window.scrollY < 50){
    showPopup();
  }
});

</script>

</body>
</html>
